index.html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Arte de Tocar | Masoterapia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --teal: #2d7a78; --rose: #e6b0aa; }
        body { background: #f4f4f4 url('https://www.transparenttextures.com/patterns/marble-white.png'); font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid white; }
        .active-btn { border-left: 4px solid var(--teal); background: white; color: var(--teal); font-weight: bold; }
    </style>
</head>
<body class="text-slate-800">
    <nav class="p-6 glass fixed w-full z-50 flex justify-between items-center shadow-sm">
        <h1 class="tracking-widest uppercase font-bold text-teal-800">El Arte de Tocar</h1>
        <button class="bg-rose-200 text-teal-900 px-4 py-2 rounded-full text-xs font-bold">RESERVAR CITA</button>
    </nav>

    <main class="pt-32 p-4 max-w-5xl mx-auto">
        <div class="glass rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="p-6 bg-white/20 w-full md:w-64 flex flex-col gap-2">
                <button onclick="ver('muscular', this)" class="active-btn p-4 text-left text-xs rounded-lg">SISTEMA MUSCULAR</button>
                <button onclick="ver('nervioso', this)" class="p-4 text-left text-xs rounded-lg">SISTEMA NERVIOSO</button>
                <button onclick="ver('circulatorio', this)" class="p-4 text-left text-xs rounded-lg">SISTEMA CIRCULATORIO</button>
                <button onclick="ver('linfatico', this)" class="p-4 text-left text-xs rounded-lg">SISTEMA LINFÁTICO</button>
                <button onclick="ver('cadenas', this)" class="p-4 text-left text-xs rounded-lg">CADENAS MUSCULARES</button>
            </div>
            <div class="flex-1 p-8 flex justify-center items-center bg-white/10">
                <img id="visor" src="img/mapa/muscular.png" class="max-h-[500px] drop-shadow-xl transition-all duration-500">
            </div>
        </div>
    </main>

    <script>
        function ver(capa, btn) {
            document.getElementById('visor').src = `img/mapa/${capa}.png`;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
        }
    </script>
</body>
</html>
