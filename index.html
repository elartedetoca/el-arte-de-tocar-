DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Arte de Tocar | Plataforma Holística</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #ffffff;
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png');
        }
        .gold-gradient { background: linear-gradient(135deg, #b76e79 0%, #dfa0a9 100%); }
        .marble-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(183, 110, 121, 0.2);
            box-shadow: 0 15px 35px rgba(183, 110, 121, 0.1);
        }
        .rose-gold-text { color: #b76e79; }
        .muscle-btn { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selected, setSelected] = useState(null);

            const muscleData = {
                trapecio: { name: 'Trapecio', info: 'Libera tensión cervical y estrés acumulado.', icon: '🧘' },
                lumbares: { name: 'Zona Lumbar', info: 'Estabilización y alivio de cargas profundas.', icon: '🛡️' },
                piernas: { name: 'Cuádriceps', info: 'Mejora la circulación y recuperación muscular.', icon: '🚶' }
            };

            return (
                <div className="p-4 max-w-md mx-auto">
                    <header className="text-center py-8">
                        <h1 className="text-3xl font-light tracking-[0.3em] uppercase rose-gold-text">El Arte de Tocar</h1>
                        <div className="h-px w-16 gold-gradient mx-auto my-4"></div>
                        <p className="text-gray-400 italic text-xs uppercase tracking-widest">Plataforma Clínica-Holística</p>
                    </header>

                    <section className="marble-card rounded-[2.5rem] p-6 mb-8 border-t-8 border-[#b76e79]">
                        <h2 className="text-xl text-center text-gray-700 font-medium mb-1">Mapa Corporal</h2>
                        <p className="text-center text-gray-400 text-xs mb-6 italic text-sm">Toca la zona de interés</p>
                        
                        <div className="flex flex-col gap-3">
                            {Object.keys(muscleData).map((id) => (
                                <button 
                                    key={id}
                                    onClick={() => setSelected(muscleData[id])}
                                    className={`muscle-btn py-4 px-6 rounded-2xl border text-left flex justify-between items-center ${selected?.name === muscleData[id].name ? 'gold-gradient text-white shadow-lg scale-105' : 'bg-white text-gray-600 border-gray-100'}`}
                                >
                                    <span className="font-medium uppercase tracking-widest text-xs">{muscleData[id].name}</span>
                                    <span>{selected?.name === muscleData[id].name ? '✨' : '⚪'}</span>
                                </button>
                            ))}
                        </div>

                        {selected && (
                            <div className="mt-8 p-4 bg-rose-50/50 rounded-2xl border border-rose-100 animate-pulse-once">
                                <div className="flex items-center gap-3 mb-2">
                                    <span className="text-2xl">{selected.icon}</span>
                                    <h3 className="font-bold rose-gold-text uppercase text-sm tracking-tighter">{selected.name}</h3>
                                </div>
                                <p className="text-gray-600 text-sm italic">{selected.info}</p>
                            </div>
                        )}
                    </section
