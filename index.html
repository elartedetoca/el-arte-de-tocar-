<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Arte de Tocar | Plataforma Holística</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            /* Efecto mármol sutil */
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png'), 
                              linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
        }
        .rose-gold-text { color: #b76e79; }
        .rose-gold-border { border-color: #b76e79; }
        .rose-gold-bg { background-color: #b76e79; }
        .marble-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(183, 110, 121, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AnatomicalApp = () => {
            const [selectedPart, setSelectedPart] = useState(null);

            const muscles = [
                { id: 'trapecio', name: 'Trapecio', info: 'Zona común de tensión por estrés. La masoterapia ayuda a liberar puntos gatillo.' },
                { id: 'pectorales', name: 'Pectorales', info: 'Importantes para la postura. Su estiramiento mejora la capacidad respiratoria.' },
                { id: 'cuadriceps', name: 'Cuádriceps', info: 'Motor principal de la marcha. Vital para la estabilidad de la rodilla.' }
            ];

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <header className="text-center mb-8">
                        <h1 className="text-3xl font-light rose-gold-text tracking-widest uppercase">El Arte de Tocar</h1>
                        <p className="text-gray-500 italic">Masoterapia & Bienestar Holístico</p>
                    </header>

                    <div className="marble-card rounded-3xl p-6 w-full max-w-md text-center">
                        <h2 className="text-xl mb-4 text-gray-700">Explora tu Anatomía</h2>
                        
                        {/* Simulación de Mapa Corporal */}
                        <div className="relative h-80 bg-gray-100 rounded-2xl mb-6 flex items-center justify-center border-2 border-dashed rose-gold-border">
                            <div className="space-y-2">
                                {muscles.map(m => (
                                    <button 
                                        key={m.id}
                                        onClick={() => setSelectedPart(m)}
                                        className={`block w-40 py-2 rounded-full transition-all ${selectedPart?.id === m.id ? 'rose-gold-bg text-white scale-105' : 'bg-white rose-gold-text border rose-gold-border'}`}
                                    >
                                        {m.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {selectedPart ? (
                            <div className="animate-fade-in">
                                <h3 className="font-bold rose-gold-text text-lg">{selectedPart.name}</h3>
                                <p className="text-gray-600 text-sm mt-2">{selectedPart.info}</p>
                            </div>
                        ) : (
                            <p className="text-gray-400 italic">Toca un músculo para aprender más</p>
                        )}
                    </div>

                    <footer className="mt-auto pt-8 text-xs text-gray-400">
                        &copy; 2026 El Arte de Tocar | Estética Mármol & Oro Rosa
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AnatomicalApp />);
    </script>
</body>
</html>
